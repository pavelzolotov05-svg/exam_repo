<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f4f4f4; }
        .status-select { padding: 5px; }
        .btn-update { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Управление заявками (Таблица: zadacha)</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>User ID</th>
                <th>Название курса</th>
                <th>Текущий статус</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody>
            {% for app in applications %}
            <tr>
                <td>{{ app.id }}</td>
                <td>{{ app.user_id }}</td>
                <td>{{ app.course_name }}</td>
                <td><strong>{{ app.status }}</strong></td>
                <td>
                    <form action="/update_status" method="POST" style="display: flex; gap: 10px;">
                        <input type="hidden" name="app_id" value="{{ app.id }}">
                        <select name="status" class="status-select">
                            <option value="Новая" {% if app.status == 'Новая' %}selected{% endif %}>Новая</option>
                            <option value="В работе" {% if app.status == 'В работе' %}selected{% endif %}>В работе</option>
                            <option value="Оплачена" {% if app.status == 'Оплачена' %}selected{% endif %}>Оплачена</option>
                            <option value="Отклонена" {% if app.status == 'Отклонена' %}selected{% endif %}>Отклонена</option>
                        </select>
                        <button type="submit" class="btn-update">Обновить</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
