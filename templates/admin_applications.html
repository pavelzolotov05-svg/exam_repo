<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявки</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #f3f3f3;
        }
        form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <h1>Панель администратора</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Пользователь</th>
                <th>Курс</th>
                <th>Форма оплаты</th>
                <th>Статус</th>
                <th>Комментарий</th>
                <th>Изменить</th>
            </tr>
        </thead>
        <tbody>
            {% for app, user, course in applications %}
            <tr>
                <td>{{ app.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ course.name }}</td>
                <td>{{ app.payment_form }}</td>
                <td>{{ app.status }}</td>
                <td>{{ app.comment }}</td>
                <td>
                    <form method="post" action="/admin/applications/{{ app.id }}/update">
                        <select name="payment_form">
                            <option value="Карта" {% if app.payment_form == 'Карта' %}selected{% endif %}>Карта</option>
                            <option value="Наличные" {% if app.payment_form == 'Наличные' %}selected{% endif %}>Наличные</option>
                            <option value="Перевод" {% if app.payment_form == 'Перевод' %}selected{% endif %}>Перевод</option>
                        </select>

                        <select name="status">
                            <option value="new" {% if app.status == 'new' %}selected{% endif %}>new</option>
                            <option value="in_progress" {% if app.status == 'in_progress' %}selected{% endif %}>in_progress</option>
                            <option value="approved" {% if app.status == 'approved' %}selected{% endif %}>approved</option>
                            <option value="rejected" {% if app.status == 'rejected' %}selected{% endif %}>rejected</option>
                        </select>

                        <button type="submit">Сохранить</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
